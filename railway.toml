[build]
builder = "DOCKERFILE"
dockerfilePath = "dashboard/backend/Dockerfile.prod"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "qa-framework-backend"

[[services.env]]
name = "DATABASE_URL"
value = "${{Postgres.DATABASE_URL}}"

[[services.env]]
name = "REDIS_URL"
value = "${{Redis.REDIS_URL}}"

[[services.env]]
name = "JWT_SECRET_KEY"
value = "${{JWT_SECRET_KEY}}"

[[services.env]]
name = "STRIPE_API_KEY"
value = "${{STRIPE_API_KEY}}"
