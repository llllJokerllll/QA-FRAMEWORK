# Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'qa-framework-monitor'

scrape_configs:
  # Backend API metrics
  - job_name: 'qa-framework-backend'
    static_configs:
      - targets: ['qa-framework-backend.railway.app:80']
    metrics_path: '/metrics'
    scheme: https
    
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
