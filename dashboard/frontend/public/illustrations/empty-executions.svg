<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Play button illustration for empty executions -->
  <defs>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#10B981" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#F9FAFB"/>
  
  <!-- Main play circle -->
  <g transform="translate(150, 80)">
    <circle cx="50" cy="60" r="55" fill="url(#playGrad)" filter="url(#shadow)"/>
    <path d="M40 45 L40 75 L70 60 Z" fill="white"/>
  </g>
  
  <!-- Decorative elements - smaller circles suggesting motion -->
  <circle cx="100" cy="200" r="12" fill="#34D399" opacity="0.3"/>
  <circle cx="85" cy="180" r="8" fill="#10B981" opacity="0.4"/>
  <circle cx="300" cy="190" r="12" fill="#34D399" opacity="0.3"/>
  <circle cx="320" cy="170" r="8" fill="#10B981" opacity="0.4"/>
  
  <!-- Progress bar suggestion -->
  <g transform="translate(100, 220)">
    <rect x="0" y="0" width="200" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="0" y="0" width="0" height="8" rx="4" fill="#10B981">
      <animate attributeName="width" from="0" to="80" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Speed lines -->
  <line x1="80" y1="100" x2="120" y2="100" stroke="#10B981" stroke-width="2" opacity="0.4"/>
  <line x1="70" y1="120" x2="115" y2="120" stroke="#10B981" stroke-width="2" opacity="0.3"/>
  <line x1="280" y1="100" x2="320" y2="100" stroke="#10B981" stroke-width="2" opacity="0.4"/>
  <line x1="285" y1="120" x2="330" y2="120" stroke="#10B981" stroke-width="2" opacity="0.3"/>
</svg>
