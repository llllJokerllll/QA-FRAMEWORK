<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Test tubes illustration for empty test suites -->
  <defs>
    <linearGradient id="tubeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E7FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#C7D2FE;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#F9FAFB"/>
  
  <!-- Test tube 1 -->
  <g transform="translate(80, 40)">
    <rect x="0" y="0" width="40" height="120" rx="8" fill="url(#tubeGrad)" stroke="#A5B4FC" stroke-width="2"/>
    <ellipse cx="20" cy="100" rx="16" ry="8" fill="#A5B4FC" opacity="0.5"/>
    <rect x="5" y="80" width="30" height="35" rx="4" fill="#818CF8" opacity="0.3"/>
  </g>
  
  <!-- Test tube 2 -->
  <g transform="translate(140, 60)">
    <rect x="0" y="0" width="40" height="100" rx="8" fill="url(#tubeGrad)" stroke="#A5B4FC" stroke-width="2"/>
    <ellipse cx="20" cy="80" rx="16" ry="8" fill="#A5B4FC" opacity="0.5"/>
    <rect x="5" y="60" width="30" height="30" rx="4" fill="#818CF8" opacity="0.3"/>
  </g>
  
  <!-- Test tube 3 -->
  <g transform="translate(200, 50)">
    <rect x="0" y="0" width="40" height="110" rx="8" fill="url(#tubeGrad)" stroke="#A5B4FC" stroke-width="2"/>
    <ellipse cx="20" cy="90" rx="16" ry="8" fill="#A5B4FC" opacity="0.5"/>
    <rect x="5" y="70" width="30" height="32" rx="4" fill="#818CF8" opacity="0.3"/>
  </g>
  
  <!-- Test tube 4 -->
  <g transform="translate(260, 70)">
    <rect x="0" y="0" width="40" height="90" rx="8" fill="url(#tubeGrad)" stroke="#A5B4FC" stroke-width="2"/>
    <ellipse cx="20" cy="70" rx="16" ry="8" fill="#A5B4FC" opacity="0.5"/>
    <rect x="5" y="50" width="30" height="28" rx="4" fill="#818CF8" opacity="0.3"/>
  </g>
  
  <!-- Decorative bubbles -->
  <circle cx="95" cy="110" r="4" fill="#818CF8" opacity="0.6"/>
  <circle cx="105" cy="130" r="3" fill="#A5B4FC" opacity="0.5"/>
  <circle cx="160" cy="115" r="3" fill="#818CF8" opacity="0.5"/>
  <circle cx="220" cy="105" r="4" fill="#A5B4FC" opacity="0.6"/>
  <circle cx="275" cy="115" r="3" fill="#818CF8" opacity="0.5"/>
  
  <!-- Plus icon (suggesting "add new") -->
  <g transform="translate(175, 200)">
    <circle cx="25" cy="25" r="25" fill="#4F46E5" opacity="0.1"/>
    <path d="M25 15 L25 35 M15 25 L35 25" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
