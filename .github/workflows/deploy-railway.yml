# ========================================
# QA-FRAMEWORK SaaS - Railway Deploy Workflow
# Automatically deploy to Railway on merge to main
# Tests are handled by CI/CD Pipeline workflow
# ========================================

name: Deploy to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-railway.yml'
  workflow_dispatch:

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  # ========================================
  # Deploy to Railway (tests run in CI/CD Pipeline)
  # ========================================
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          # Use RAILWAY_TOKEN env var directly with railway up
          railway up --service QA-FRAMEWORK
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health Check
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30

          # Railway service URL
          SERVICE_URL="https://qa-framework-production.up.railway.app"

          # Check health endpoint
          curl -f $SERVICE_URL/health || exit 1

          echo "✅ Deployment successful and healthy!"

      - name: Notify on success
        if: success()
        run: |
          echo "🎉 Deployed successfully to Railway!"
          echo "URL: ${{ secrets.RAILWAY_SERVICE_URL }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          # You can add Slack/Discord notification here

  # ========================================
  # Run Migrations (if needed)
  # ========================================
  migrate:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    continue-on-error: true  # Don't fail the whole workflow if migrations fail

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd dashboard/backend
          pip install -r requirements.txt
          pip install alembic

      - name: Check DATABASE_URL
        run: |
          if [ -z "${{ secrets.RAILWAY_DATABASE_URL }}" ]; then
            echo "::warning::RAILWAY_DATABASE_URL secret is not set"
            echo "skip_migrations=true" >> $GITHUB_OUTPUT
          else
            echo "DATABASE_URL is configured"
          fi
        id: check_secrets

      - name: Run Alembic migrations
        if: steps.check_secrets.outputs.skip_migrations != 'true'
        run: |
          cd dashboard/backend
          # Check if alembic.ini exists
          if [ ! -f "alembic.ini" ]; then
            echo "::warning::alembic.ini not found - skipping migrations"
            exit 0
          fi
          # Run migrations with verbose output
          alembic upgrade head --sql 2>&1 || echo "No migrations to apply"
          alembic upgrade head 2>&1 || {
            echo "::warning::Migration failed - database might already be up to date"
            exit 0
          }
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}

      - name: Migration Summary
        if: always()
        run: |
          echo "## Migration Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_secrets.outputs.skip_migrations }}" == "true" ]; then
            echo "⚠️ Migrations skipped - DATABASE_URL not configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Migrations completed (or no migrations needed)" >> $GITHUB_STEP_SUMMARY
          fi

# ========================================
# Required GitHub Secrets
# ========================================
# You need to set these secrets in your GitHub repo:
#
# 1. RAILWAY_TOKEN - Get from Railway dashboard: Settings > API Tokens
# 2. RAILWAY_SERVICE_URL - Your Railway service URL (e.g., https://qa-framework-backend.railway.app)
# 3. RAILWAY_DATABASE_URL - Your Railway PostgreSQL connection string
#
# To set secrets:
# GitHub repo > Settings > Secrets and variables > Actions > New repository secret
